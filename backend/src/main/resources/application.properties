# Application
spring.application.name=todo-app

# PostgreSQL DataSource — values injected via Docker environment variables
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:todoapp}
spring.datasource.username=${DB_USER:todoapp}
spring.datasource.password=${DB_PASSWORD:todoapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator — expose health endpoint for Docker health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Server
server.port=8080
